name: moon_farm
description: Moon Farm - Lunar Agricultural Management Game
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.0
  shared_preferences: ^2.2.3
  yaml: ^3.1.2
  toml: ^0.18.0

  # Ads (AdMob - configure app ID and ad unit IDs before enabling)
  # google_mobile_ads: ^5.1.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config/
