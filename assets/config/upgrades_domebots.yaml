#  assets/config/upgrades_domebots.yaml
# ═══════════════════════════════════════════════════════════════
#
# Dome Bot upgrade paths. One bot per dome. Upgradeable in place.
# Max level: Mk4 (all abilities unlocked).
#
# ACTIONS (cumulative — each Mk includes all previous Mk actions):
#   Mk1:  auto-water all cells each week
#   Mk2:  + auto-harvest ready crops into silo
#   Mk3:  + auto-fertilize (costs 2 compost per cell)
#   Mk4:  + auto-plant (you set one crop type per dome, it replants empty cells)
#
# unlock_preview: shown on the upgrade button before you buy.

dome_bots:
  levels:
    - level: 1
      name: Dome Bot Mk1
      actions: [water]
      unlock_preview: "Unlocks: 💧 Auto-Water"
      next_unlock_preview: "Upgrade → Unlocks: 🌾 Auto-Harvest"
      build_cost:
        metals: 20
      power_draw_kwh: 2

    - level: 2
      name: Dome Bot Mk2
      actions: [water, harvest]
      unlock_preview: "Unlocks: 🌾 Auto-Harvest"
      next_unlock_preview: "Upgrade → Unlocks: ♻️ Auto-Fertilize"
      upgrade_cost:
        metals: 35
        components: 15
      power_draw_kwh: 5

    - level: 3
      name: Dome Bot Mk3
      actions: [water, harvest, fertilize]
      unlock_preview: "Unlocks: ♻️ Auto-Fertilize"
      next_unlock_preview: "Upgrade → Unlocks: 🌱 Auto-Plant"
      upgrade_cost:
        metals: 60
        components: 30
        chemicals: 15
      power_draw_kwh: 10

    - level: 4
      name: Dome Bot Mk4
      actions: [water, harvest, fertilize, plant]
      unlock_preview: "Unlocks: 🌱 Auto-Plant"
      next_unlock_preview: ""
      upgrade_cost:
        metals: 100
        components: 60
        chemicals: 30
        chitin: 20
      power_draw_kwh: 25