#
# Refinery machine upgrade paths.
# All 5 machines defined here: composter, smelter, z_soil_processor,
# glass_furnace, component_fabricator.
#
# STRUCTURE PER MACHINE:
#   name:         Display name
#   emoji:        Emoji icon
#   levels:       List of level definitions (level 1 = starting Mk1)
#     level:          Mk level number
#     build_cost:     (level 1 ONLY) Resources to install this machine from scratch
#     upgrade_cost:   (levels 2+) Resources to upgrade from previous level
#     power_draw_kwh: Passive power draw while installed (whether processing or not)
#     recipe_in:      Input resources consumed per one PROCESS click
#     recipe_out:     Output resources produced per one PROCESS click
#
# COST PHILOSOPHY:
#   Mk1-2:  Primitive materials only (moon_dirt, chemicals, ore, sand, water, compost)
#   Mk3-4:  Metals + basic materials
#   Mk5-6:  Metals + components
#   Mk7-8:  Metals + components + glass
#   Mk9-10: Metals + components + glass + chitin
#   No scrip ever. You source everything yourself.
#
# EDITING TIPS:
#   - Indentation matters in YAML. Use 2 spaces, never tabs.
#   - Costs of 0 can just be omitted entirely.
#   - To add a new material cost, just add it under build_cost or upgrade_cost.
#   - recipe_in and recipe_out can have any resource key from the game.

# ─── COMPOSTER ───────────────────────────────────────────────────────────────
# The slow, dumb cousin of the Z-Soil Processor.
# Only input: compost (a free byproduct of farming).
# Tops out at Mk3 — nature can only be nudged so much.
# Great as a passive compost sink. Not worth heavy investment.

composter:
  name: Composter
  emoji: ♻️
  caps_at_level: 3
  levels:
    - level: 1
      build_cost:
        compost: 10
        moon_dirt: 5
      power_draw_kwh: 1
      recipe_in:
        compost: 8
      recipe_out:
        z_soil: 5

    - level: 2
      upgrade_cost:
        compost: 20
        moon_dirt: 10
        ore: 2
      power_draw_kwh: 2
      recipe_in:
        compost: 6
      recipe_out:
        z_soil: 6

    - level: 3
      upgrade_cost:
        moon_dirt: 15
        ore: 5
        chemicals: 3
      power_draw_kwh: 3
      recipe_in:
        compost: 5
      recipe_out:
        z_soil: 8


