# Sequential unlock configuration.
# Wave 1 (Week 10) is 100% locked to the weakest fallback creature.
# Every subsequent 10 weeks, the next tier unlocks.

scheduling:
  first_raid_week: 10
  raid_interval_easy: 12
  raid_interval_normal: 10
  raid_interval_hard: 6
  raid_warning_weeks_before: 2

scaling:
  base_fauna_count: 5
  fauna_per_week: 2
  fauna_per_week_divisor: 5      # Week 10 = 8 fauna, Week 20 = 13 fauna (50%+ jump)
  max_fauna_count: 60
  raid_duration_max: 90
  spawn_interval_base: 3.0
  spawn_interval_min: 1.5

# ─── FAUNA TYPES ─────────────────────────────────────────────────────────────
# Sorted strictly by power. High-tier threats are mathematically locked out
# in early weeks by checking the raid_week threshold.
