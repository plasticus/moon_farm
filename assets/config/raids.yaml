raid_scheduling:
  first_raid_week: 10
  raid_warning_weeks_before: 2

# Core intervals between raids based on difficulty settings
raid_intervals:
  easy: 12
  normal: 10
  hard: 8

# Note: Max counts and scaling parameters are safely handled by
# the deterministic matrix, but we preserve these for global settings.
raid_scaling:
  spawn_interval_base: 1.5    # At lowest levels, this is the time between spawns
  spawn_interval_min: 0.234375 # 30s/128 creatures, so this is the minimum time between spawns at max rates
  raid_duration_max: 30       # maximum time for a wave

raid_drops:
  meat_chance: 0.70
  # Chitin chance per kill = (this creature type's chitin_chance below) +
  # (kills_this_raid_so_far * chitin_chance_climb_per_kill). The climb
  # resets every raid and is shared across all fauna types — only the
  # per-type base below varies by creature. Tune this single number to
  # make the climb feel faster/slower without touching every fauna entry.
  chitin_chance_climb_per_kill: 0.002

# ─── CORE FAUNA TYPES ─────────────────────────────────────────
# Stats here represent Level 1 baselines.
# Higher levels automatically scale up dynamically (+100 HP, +14 DMG).
# chitin_chance is each type's own baseline drop chance (before the
# per-kill climb above is added on top) — tuned by relative toughness,
# not strictly by score_value alone (e.g. Dust Swarmer sits below
# Lunar Crawler despite an identical score_value, since its raw stats
# are weaker). Adjust freely per type.
fauna_types:
  Lunar Crawler:
    display_name: "Lunar Crawler"
    hp: 20
    damage: 8
    speed: 1.5
    emoji: "🐛"
