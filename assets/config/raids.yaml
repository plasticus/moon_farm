raid_scheduling:
  first_raid_week: 10
  raid_warning_weeks_before: 2

# Core intervals between raids based on difficulty settings
raid_intervals:
  easy: 12
  normal: 10
  hard: 8

# Note: Max counts and scaling parameters are safely handled by
# the deterministic matrix, but we preserve these for global settings.
raid_scaling:
  spawn_interval_base: 1.5    # At lowest levels, this is the time between spawns
  spawn_interval_min: 0.234375 # 30s/128 creatures, so this is the minimum time between spawns at max rates
  raid_duration_max: 30       # maximum time for a wave

raid_drops:
  meat_chance: 0.70
  chitin_chance_non_brute: 0.15

# ─── CORE FAUNA TYPES ─────────────────────────────────────────
