# ═══════════════════════════════════════════════════════════════
#  assets/config/radio_triggers.toml
# ═══════════════════════════════════════════════════════════════
#
# One-shot radio messages that fire automatically when a specific
# game-state condition is met. Each one fires exactly once per save,
# ever — tracked internally by its `id`.
#
# ── TOML QUICK REFERENCE ─────────────────────────────────────────
# This file is TOML (https://toml.io). The short version:
#   - `key = value` sets a field. Strings need quotes, numbers don't.
#   - `[[trigger]]` starts a NEW entry in a list of trigger tables —
#     every trigger in this file is one of these blocks. The double
#     brackets matter (single [trigger] would mean something else).
#   - `#` starts a comment, same as everywhere else.
#   - Multi-line strings use triple quotes """like this""" if you
#     ever need a message that spans multiple lines in the file.
#
# ── REQUIRED FIELDS on every [[trigger]] ─────────────────────────
#   id      - unique string. NEVER change or reuse an id once a
#             version has shipped — that's how the game remembers
#             which triggers have already fired for a given save.
#   kind    - which condition to check. See the full list below.
#   value   - the threshold/target the kind checks against. Type
#             depends on kind (a number for most, a string for
#             feature_unlocked).
#   message - the text sent to the radio feed. Supports the same
#             {week} variable as radio_pool.toml.
#
# ── OPTIONAL FIELDS ───────────────────────────────────────────────
#   show_as_tip = true
#       Also shows as the persistent tip banner on the Week Summary
#       screen (this is how the original "Colony Tip" messages work —
#       see the tip_week* entries below). Only makes sense paired with
#       kind = "week", since the banner shows "the most recent
#       week-trigger you've reached so far."
#
# ── AVAILABLE TRIGGER KINDS ───────────────────────────────────────
# All of these are already wired up — just add a new [[trigger]]
# block below, no code changes needed. Every kind here is an
# "at least" check (>=), not an exact match — that way a trigger
# still fires correctly even if something jumps past the exact
# threshold (e.g. a dev/debug time-skip).
#
#   week                     value = week number. Fires the first
#                            week currentWeek reaches this.
#   dome_count               value = dome count. Fires once you've
#                            built at least this many domes, ever.
#   dome_tier_reached        value = tier (1-5). Fires once ANY dome
#                            reaches at least this tier.
#   feature_unlocked         value = a string matching an entry in
#                            unlockedFeatures. Built-in flags today:
#                            "mycoculture_vat", "mycovault_reactor",
#                            "scrap_dealer" — any future flag added
#                            to unlockedFeatures works automatically,
#                            no code changes needed here either.
#   crops_harvested_total    value = lifetime crops harvested.
#   volume_delivered_total   value = lifetime m³ delivered to colony.
#   lifetime_scrip_earned    value = lifetime scrip earned (not
#                            current balance — this only goes up).
#   raids_survived           value = total raids successfully
#                            defended.
#   fauna_killed_total       value = lifetime fauna killed in raids.
#   chitin_collected_total   value = lifetime chitin collected from
#                            raids.
#   compost_generated_total  value = lifetime compost generated.
#   contracts_completed      value = lifetime contracts completed.
#   game_start               value can be anything (ignored). Fires
#                            once, the moment a new game is created.
#
# ── KINDS THAT WOULD NEED A LITTLE DART WORK FIRST ────────────────
# (the underlying counter/hook doesn't exist yet, but could be added)
#   - a specific fauna type's first kill (e.g. "first Apex Stalker")
#   - lifetime scrip SPENT (only current balance + earned exist today)
#   - a specific machine reaching Mk10
#   - a specific sentry tier built
#
# ═══════════════════════════════════════════════════════════════

# ─── Game start ───────────────────────────────────────────────────

[[trigger]]
id = "opening_transmission"
kind = "game_start"
value = 0
message = "New operator confirmed. I'm Specialist Kovacs, your relay contact for Olanthe Sector 4J. The previous farmer left in a hurry — something about the fauna. Didn't elaborate. Your starting supplies were dropped this morning. First scheduled pickup is Week 4. Don't be late. I have other things to do. — Kovacs"

