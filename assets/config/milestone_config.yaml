# ═══════════════════════════════════════════════════════════════
#  assets/config/milestone_config.yaml
# ═══════════════════════════════════════════════════════════════
# All milestone and difficulty configuration.
# Edit this file to rebalance goals, deadlines, and failure messages.
#
# MILESTONE FIELDS:
#   id:                 unique string key
#   check_type:         'volume_delivered' | 'power_capacity' |
#                        'contracts_completed' | 'fauna_killed' |
#                        'crop_diversity' | 'contract_diversity' — see
#                        EndWeekEngine._isMilestoneComplete for what `target`
#                        means for each type. Omit for volume_delivered
#                        (that's the default).
#   name:               display name
#   description:        shown in milestone list
#   target:             meaning depends on check_type — m³ for
#                        volume_delivered, kW for power_capacity, a count
#                        for contracts_completed/fauna_killed, or the crop
#                        tier number (1-5) for crop_diversity/contract_diversity.
#                        contract_diversity only counts sellable crops in that
#                        tier (skips moss/chitin/meat resource crops, which
#                        can't generate contracts).
#   by_week:             deadline week (inclusive). OMIT this field entirely
#                        for achievement-style milestones (anything other
#                        than volume_delivered) — no deadline means no
#                        warned/failed/terminated path, it just waits until
#                        completed. Only volume_delivered milestones are
#                        checked in order and terminate the contract on miss.
#   reward_scrip:       scrip paid on completion
#   failure_message:    shown on score screen if missed (deadline milestones only)
#   failure_detail:     secondary line (e.g. "delivered {actual}/{target}m³")
#
# DIFFICULTY SETTINGS:
#   wall_strikes:       how many wall breaches before game over (0 = instant)
#   crop_loss_on_breach: fraction of crops lost when wall breaks (0.0–1.0)

# ─── DIFFICULTY SETTINGS ──────────────────────────────────────────────────────

difficulty:
  easy:
    wall_strikes: 2          # 3rd breach = game over
    crop_loss_on_breach: 0.3 # lose 30% of crops per breach
    contract_termination_message: >
      After {strikes} wall breaches, the colony has decided your operation
      poses too great a risk to their supply chain. Contract nullified.

  normal:
    wall_strikes: 0          # any wall breach = instant game over
    crop_loss_on_breach: 0.0
    contract_termination_message: >
      Your wall was breached on Week {week}. The colony cannot tolerate
      an undefended agricultural operation. Contract nullified immediately.

  hard:
    wall_strikes: 0
    crop_loss_on_breach: 0.0
    contract_termination_message: >
      Wall breach on Week {week}. The colony expected better.
      Contract nullified. Your equipment will be reassigned.

# ─── MILESTONES ───────────────────────────────────────────────────────────────
